<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <title>MeetingOps</title>
  </head>
  <body>
    <header><span class="dot"></span><div><strong>MeetingOps</strong><small>Meet audio agent</small></div></header>
    <main>
      <p id="status">Ready to capture this Google Meet.</p>
      <p id="detail"></p>
      <button id="toggle">Start MeetingOps</button>
      <details>
        <summary>Connection settings</summary>
        <label>Backend URL<input id="backend" type="url"></label>
        <label>Extension token<input id="token" type="password" placeholder="Optional"></label>
        <button id="save" class="secondary">Save settings</button>
      </details>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
